[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
broadcast = "broadcast"
script = "script"
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Solidity configuration
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

# Build configuration for deterministic builds
bytecode_hash = "none"
cbor_metadata = false

# Gas reporting and testing
gas_reports = ["*"]
gas_limit = 100000000

# Fuzzing configuration
fuzz = { runs = 1000, max_test_rejects = 65536 }

# Clean imports for V1 modular architecture
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@uniswap/=lib/v4-core/src/",
    "@forge-std/=lib/forge-std/src/",
    "@yolo/=src/"
]

[profile.test]
optimizer_runs = 200
verbosity = 2
gas_reports = ["YoloCore", "StablecoinModule", "SyntheticAssetModule"]
bytecode_hash = "none"

[profile.production]
optimizer_runs = 2000000
via_ir = true
bytecode_hash = "ipfs"
cbor_metadata = true

[profile.coverage]
gas_reports = []
optimizer = false

# CI profile (used by GitHub Actions) - matches default profile for consistent formatting
[profile.ci]
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
fuzz = { runs = 1000, max_test_rejects = 65536 }
verbosity = 2

# Linter configuration
[lint]
exclude_lints = [
    "mixed-case-variable",           # Keep USY, yETH, pnlUSY domain-specific naming
    "mixed-case-function",           # Keep EIP-712 DOMAIN_SEPARATOR, OpenZeppelin __init
    "asm-keccak256",                 # Not worth complexity for minimal gas savings
    "unwrapped-modifier-logic",      # Only needed if hitting 24KB contract limit
    "pascal-case-struct",            # YLPStorage is correct PascalCase (linter limitation)
    "screaming-snake-case-immutable" # Acceptable for test mocks
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
